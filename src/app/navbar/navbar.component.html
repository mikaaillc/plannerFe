<nav class="global-navbar">
  <div class="logo" (click)="goHome()" style="cursor: pointer; display: flex; align-items: center; gap: 10px;">
    <img src="assets/images/logo.png" alt="CityPlanner Logo" class="logo-img">
    <span class="brand-name">CityPlanner</span>
  </div>

  <!-- Logged Out Links -->
  <div class="nav-links" *ngIf="!user">
    <a href="#about" *ngIf="router.url === '/'">Hakkımızda</a>
    <a href="#pricing" *ngIf="router.url === '/'">Fiyatlandırma</a>
    <label class="theme-switch">
      <input type="checkbox" [checked]="themeService.isDark()" (change)="themeService.toggleTheme()">
      <span class="slider round">
        <span class="icon sun">☀️</span>
        <span class="icon moon">🌙</span>
      </span>
    </label>
    <button class="btn btn-outline" (click)="goToLogin()">Giriş Yap</button>
    <button class="btn btn-primary" (click)="router.navigate(['/register'])">Kayıt Ol</button>
  </div>

  <!-- Logged In Links -->
    <div class="nav-links" *ngIf="user">
    <button class="btn btn-outline" *ngIf="router.url !== '/dashboard'" (click)="router.navigate(['/dashboard'])" style="font-weight:bold; color:var(--primary-color); border-color:var(--primary-color);">🔙 Hızlı Menüye Dön</button>
    <button class="btn btn-outline" *ngIf="user.role === 'ROLE_ADMIN'" (click)="router.navigate(['/admin'])">⚙️ Yönetim Paneli</button>
    <button class="btn btn-outline" *ngIf="user.role === 'ROLE_PLANNER'" (click)="router.navigate(['/available-jobs'])">📋 Açık İşler</button>
    <button class="btn btn-outline" *ngIf="user.role === 'ROLE_PLANNER'" (click)="router.navigate(['/accepted-jobs'])">✅ Kabul Edilen Planlarım</button>
    <button class="btn btn-outline" *ngIf="user.role === 'ROLE_PLANNER'" (click)="router.navigate(['/profile'])">✏️ Profilim</button>
    <button class="btn btn-outline" *ngIf="user.role === 'ROLE_ENTITY'" (click)="router.navigate(['/entity-jobs'])">🏢 İşlerim</button>
    <button class="btn btn-outline" *ngIf="user.role === 'ROLE_ENTITY'" (click)="router.navigate(['/entity-profile'])">✏️ Profilim</button>
    <button class="btn btn-outline" *ngIf="user.role !== 'ROLE_ADMIN'" (click)="router.navigate(['/subscribe'])">⭐ Abonelik</button>
    <span class="user-badge">{{user.fullName}} <small>({{user.role === 'ROLE_PLANNER' ? 'Plancı' : user.role === 'ROLE_ADMIN' ? 'Admin' : 'Kurum'}})</small></span>
    
    <label class="theme-switch">
      <input type="checkbox" [checked]="themeService.isDark()" (change)="themeService.toggleTheme()">
      <span class="slider round">
        <span class="icon sun">☀️</span>
        <span class="icon moon">🌙</span>
      </span>
    </label>
    
    <button class="btn btn-logout" (click)="logout()">Çıkış</button>
  </div>
</nav>
