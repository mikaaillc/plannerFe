<nav class="global-navbar" [class.logged-in]="user">
  <div class="logo" style="display: flex; align-items: center; gap: 10px;">
    <!-- Hamburger Menu Button -->
    <button class="hamburger-btn" *ngIf="user" (click)="toggleSidebar()">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
        <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
      </svg>
    </button>
    <div (click)="goHome()" style="cursor: pointer; display: flex; align-items: center; gap: 10px;">
      <img src="assets/images/cityplanner_logo.png" alt="Şehir Plancı Platformu Logo" class="logo-img" style="height: 40px;">
      <span class="brand-name">Şehir Plancı Platformu</span>
    </div>
  </div>

  <!-- Logged Out Links -->
  <div class="nav-links" *ngIf="!user">
    <a href="#about" *ngIf="router.url === '/'">Hakkımızda</a>
    <a href="#pricing" *ngIf="router.url === '/'">Fiyatlandırma</a>
    <label class="theme-switch">
      <input type="checkbox" [checked]="themeService.isDark()" (change)="themeService.toggleTheme()">
      <span class="slider round">
        <span class="icon sun">☀️</span>
        <span class="icon moon">🌙</span>
      </span>
    </label>
    <button class="btn btn-outline" (click)="goToLogin()">Giriş Yap</button>
    <button class="btn btn-primary" (click)="router.navigate(['/register'])">Kayıt Ol</button>
  </div>

  <!-- Logged In Top Bar Actions -->
  <div class="nav-links" *ngIf="user">
    <span class="user-badge">{{user.fullName}} <small>({{user.role === 'ROLE_PLANNER' ? 'Plancı' : user.role === 'ROLE_ADMIN' ? 'Admin' : 'Kurum'}})</small></span>
    
    <label class="theme-switch">
      <input type="checkbox" [checked]="themeService.isDark()" (change)="themeService.toggleTheme()">
      <span class="slider round">
        <span class="icon sun">☀️</span>
        <span class="icon moon">🌙</span>
      </span>
    </label>
    
    <button class="btn btn-logout" (click)="logout()">Çıkış</button>
  </div>
</nav>

<!-- Left Sidebar Overlay -->
<div class="sidebar-overlay" *ngIf="user" [class.open]="isSidebarOpen" (click)="closeSidebar()"></div>

<!-- Left Sidebar Menu -->
<aside class="sidebar-menu" *ngIf="user" [class.open]="isSidebarOpen">
  <div class="sidebar-header">
    <h3>Menü</h3>
    <button class="close-btn" (click)="closeSidebar()">×</button>
  </div>
  <div class="sidebar-links">
    <button class="sidebar-link" *ngIf="router.url !== '/dashboard'" (click)="router.navigate(['/dashboard']); closeSidebar()">🔙 Hızlı Menüye Dön</button>
    <button class="sidebar-link" *ngIf="user.role === 'ROLE_ADMIN'" (click)="router.navigate(['/admin']); closeSidebar()">⚙️ Yönetim Paneli</button>
    <button class="sidebar-link" *ngIf="user.role === 'ROLE_PLANNER'" (click)="router.navigate(['/available-jobs']); closeSidebar()">📋 Açık İşler</button>
    <button class="sidebar-link" *ngIf="user.role === 'ROLE_PLANNER'" (click)="router.navigate(['/accepted-jobs']); closeSidebar()">✅ Kabul Edilen Planlarım</button>
    <button class="sidebar-link" *ngIf="user.role === 'ROLE_PLANNER'" (click)="router.navigate(['/profile']); closeSidebar()">✏️ Profilim</button>
    <button class="sidebar-link" *ngIf="user.role === 'ROLE_ENTITY'" (click)="router.navigate(['/entity-jobs']); closeSidebar()">🏢 İşlerim</button>
    <button class="sidebar-link" *ngIf="user.role === 'ROLE_ENTITY'" (click)="router.navigate(['/entity-profile']); closeSidebar()">✏️ Profilim</button>
    <button class="sidebar-link" *ngIf="user.role === 'ROLE_PLANNER' && user.subscriptionType === 'PREMIUM_PLANNER'" (click)="router.navigate(['/partner-search']); closeSidebar()">🤝 Partner Bul</button>
    <button class="sidebar-link" *ngIf="user.role === 'ROLE_PLANNER' && user.subscriptionType === 'PREMIUM_PLANNER'" (click)="router.navigate(['/partner-offers']); closeSidebar()">📬 Partner Teklifleri</button>
    <button class="sidebar-link" *ngIf="user.role !== 'ROLE_ADMIN'" (click)="router.navigate(['/pricing']); closeSidebar()">⭐ Paketler</button>
  </div>
</aside>
