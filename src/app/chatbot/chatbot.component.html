<div class="chat-widget">
  <button class="chat-toggle" (click)="toggleChat()">
    <i class="fa" [ngClass]="isOpen ? 'fa-times' : 'fa-comment'"></i> AI
  </button>

  <div class="chat-window" *ngIf="isOpen">
    <div class="chat-header">
      <span>Yapay Zeka Asistanı</span>
      <button class="report-btn" (click)="reportError()" title="Hata Bildir">
        Hata Bildir
      </button>
    </div>

    <div class="chat-body" #chatBody>
      <div *ngFor="let msg of messages" 
           class="message" 
           [ngClass]="{'user': msg.isUser, 'bot': !msg.isUser, 'error-msg': msg.isError}">
        {{ msg.text }}
      </div>
      <div *ngIf="isLoading" class="message bot">
        <em>Yazıyor...</em>
      </div>
    </div>

    <div class="suggestions" *ngIf="suggestions.length > 0">
      <button *ngFor="let sug of suggestions" class="suggestion-btn" (click)="useSuggestion(sug)">
        {{ sug }}
      </button>
    </div>

    <div class="chat-footer">
      <input type="text" class="chat-input" [(ngModel)]="inputMessage" 
             placeholder="Bir şey sorun..." (keyup.enter)="sendMessage()">
      <button class="send-btn" (click)="sendMessage()" [disabled]="isLoading">
        ▶
      </button>
    </div>
  </div>
</div>
